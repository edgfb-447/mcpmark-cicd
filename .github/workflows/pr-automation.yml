name: PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm ci
      - name: Run ESLint
        id: eslint
        run: npm run lint
        continue-on-error: true
      - name: Run Prettier
        id: prettier
        run: npx prettier --check src/
        continue-on-error: true
      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintOutcome = '${{ steps.eslint.outcome }}';
            const prettierOutcome = '${{ steps.prettier.outcome }}';
            
            let eslintStatus = eslintOutcome === 'success' ? '✅ Passed' : '❌ Failed';
            let prettierStatus = prettierOutcome === 'success' ? '✅ Passed' : '❌ Failed';
            
            const body = `### Code Quality Report\n\n- **ESLint**: ${eslintStatus}\n- **Prettier**: ${prettierStatus}\n\n_Report generated by PR Automation Workflow_`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            
            if (eslintOutcome === 'failure' || prettierOutcome === 'failure') {
              core.setFailed('Code Quality checks failed');
            }

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm ci
      - name: Run Test Suite
        id: tests
        run: npm test
        continue-on-error: true
      - name: Upload Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const testOutcome = '${{ steps.tests.outcome }}';
            
            let testStatus = testOutcome === 'success' ? '✅ Passed' : '❌ Failed';
            
            const body = `### Test Coverage Report\n\n- **Test Suite Status**: ${testStatus}\n\n_Coverage artifacts have been uploaded._`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            
            if (testOutcome === 'failure') {
              core.setFailed('Tests failed');
            }

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm ci
      - name: Run Dependency Vulnerability Check
        id: audit
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Scan for Secrets
        id: secrets
        run: |
          # Simple pattern match for demonstration
          if grep -rE "API_KEY|SECRET|PASSWORD" src/; then
            echo "Potential secrets found"
            exit 1
          else
            echo "No secrets found"
          fi
        continue-on-error: true
      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const auditOutcome = '${{ steps.audit.outcome }}';
            const secretsOutcome = '${{ steps.secrets.outcome }}';
            
            let auditStatus = auditOutcome === 'success' ? '✅ Safe' : '⚠️ Vulnerabilities Found';
            let secretsStatus = secretsOutcome === 'success' ? '✅ Passed' : '❌ Potential Secrets Found';
            
            const body = `### Security Scan Report\n\n- **Dependencies**: ${auditStatus}\n- **Secrets Scan**: ${secretsStatus}\n\n_Please review the job logs for detailed findings._`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            
            if (auditOutcome === 'failure' || secretsOutcome === 'failure') {
              core.setFailed('Security issues found');
            }

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm ci
      - name: Build Application
        id: build
        run: npm run build
      - name: Validate Endpoints
        id: validation
        run: |
          npm start &
          SERVER_PID=$!
          echo "Server started with PID $SERVER_PID"
          
          # Wait for server to be ready
          for i in {1..10}; do
            if curl -f http://localhost:3000/health; then
              echo "Server is up"
              break
            fi
            echo "Waiting for server..."
            sleep 2
          done
          
          # Run health check script
          npm run health-check
          
          # Cleanup
          kill $SERVER_PID
          wait $SERVER_PID 2>/dev/null
        timeout-minutes: 2
      - name: Post Build Validation
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const buildOutcome = '${{ steps.build.outcome }}';
            const validationOutcome = '${{ steps.validation.outcome }}';
            
            let buildStatus = buildOutcome === 'success' ? '✅ Success' : '❌ Failed';
            let validationStatus = validationOutcome === 'success' ? '✅ Passed' : '❌ Failed';
            
            const body = `### Build Validation\n\n- **Build Status**: ${buildStatus}\n- **Endpoint Validation**: ${validationStatus}\n\n_Deployment preview artifacts are ready._`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            
            if (buildOutcome === 'failure' || validationOutcome === 'failure') {
              core.setFailed('Build validation failed');
            }
